<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cobot Factory Sim</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1f2b; user-select: none; }
        #root { width: 100vw; height: 100vh; }
        
        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #0ea5e9;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range].accent-red::-webkit-slider-thumb {
            background: #ef4444;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #4b5563;
            border-radius: 2px;
        }
        /* Loader Animation */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            color: #38bdf8;
            font-family: 'Arial Black', sans-serif;
            letter-spacing: 0.1em;
            background: #1a1f2b;
        }

        .robot-scene {
            position: relative;
            width: 240px;
            height: 140px;
            margin-bottom: 20px;
        }

        /* Conveyor */
        .conveyor {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 80%;
            height: 8px;
            background: #334155;
            border-radius: 4px;
            overflow: hidden;
        }
        .conveyor::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(90deg, transparent, transparent 10px, #475569 10px, #475569 20px);
            animation: moveBelt 1s linear infinite;
        }
        @keyframes moveBelt {
            from { transform: translateX(0); }
            to { transform: translateX(20px); }
        }

        /* Ground */
        .ground {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: #1e293b;
            border-radius: 2px;
        }

        /* Box */
        .box {
            position: absolute;
            bottom: 28px;
            left: 0;
            width: 24px;
            height: 24px;
            background: #eab308;
            border-radius: 3px;
            animation: moveBox 2.5s linear infinite;
        }
        @keyframes moveBox {
            0% { transform: translateX(-30px) rotate(0deg); opacity: 1; bottom: 28px; }
            65% { transform: translateX(180px) rotate(0deg); opacity: 1; bottom: 28px; }
            75% { transform: translateX(210px) rotate(45deg); opacity: 1; bottom: 4px; }
            85% { transform: translateX(220px) rotate(90deg); opacity: 0; bottom: 4px; }
            100% { transform: translateX(220px) rotate(90deg); opacity: 0; bottom: 4px; }
        }

        /* Robot Base */
        .robot-arm-base {
            position: absolute;
            bottom: 20px;
            left: 108px;
            width: 24px;
            height: 16px;
            background: #1e293b;
            border-top-left-radius: 6px;
            border-top-right-radius: 6px;
            z-index: 10;
        }

        /* Arm Links */
        .link1 {
            position: absolute;
            bottom: 8px;
            left: 6px;
            width: 12px;
            height: 60px;
            background: #475569;
            border-radius: 6px;
            transform-origin: 50% calc(100% - 6px);
            animation: animL1 2.5s ease-in-out infinite;
        }
        .link2 {
            position: absolute;
            top: 6px;
            left: 1px;
            width: 10px;
            height: 50px;
            background: #64748b;
            border-radius: 5px;
            transform-origin: 50% 5px;
            animation: animL2 2.5s ease-in-out infinite;
        }
        .link3 {
            position: absolute;
            top: calc(100% - 5px);
            left: 1px;
            width: 8px;
            height: 30px;
            background: #94a3b8;
            border-radius: 4px;
            transform-origin: 50% 4px;
            animation: animL3 2.5s ease-in-out infinite;
        }
        
        /* Laser Scanner */
        .laser {
            position: absolute;
            bottom: -25px;
            left: 3px;
            width: 2px;
            height: 25px;
            background: #38bdf8;
            box-shadow: 0 0 8px #38bdf8;
            animation: animLaser 2.5s infinite;
            transform-origin: top center;
        }

        @keyframes animL1 {
            0% { transform: rotate(-50deg); }
            40% { transform: rotate(0deg); }
            80% { transform: rotate(50deg); }
            100% { transform: rotate(-50deg); }
        }
        @keyframes animL2 {
            0% { transform: rotate(90deg); }
            40% { transform: rotate(40deg); }
            80% { transform: rotate(90deg); }
            100% { transform: rotate(90deg); }
        }
        @keyframes animL3 {
            0% { transform: rotate(-40deg); }
            40% { transform: rotate(-40deg); }
            80% { transform: rotate(-140deg); }
            100% { transform: rotate(-40deg); }
        }
        @keyframes animLaser {
            0%, 20% { opacity: 0; }
            30%, 50% { opacity: 1; height: 35px; }
            60%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loader-container">
            <div class="robot-scene">
                <div class="ground"></div>
                <div class="conveyor"></div>
                <div class="box"></div>
                <div class="robot-arm-base">
                    <div class="link1">
                        <div class="link2">
                            <div class="link3">
                                <div class="laser"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div>BOOTING COBOT...</div>
        </div>
    </div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
